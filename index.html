<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensor Rohdaten</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #111; color: #0f0; }
        h1 { color: #fff; }
        .sensor-block { margin-bottom: 20px; border: 1px solid #333; padding: 10px; }
        button { padding: 10px 20px; font-size: 16px; background: #222; color: #fff; border: 1px solid #fff; cursor: pointer; }
        button:hover { background: #333; }
    </style>
</head>
<body>

    <h1>Sensor Rohdaten</h1>
    
    <button id="request-btn">Sensoren aktivieren</button>
    <p id="status">Status: Warte auf Aktivierung...</p>

    <div class="sensor-block">
        <h3>Beschleunigung (inkl. Gravitation) [m/s²]</h3>
        <p>X: <span id="acc-x">0.00</span></p>
        <p>Y: <span id="acc-y">0.00</span></p>
        <p>Z: <span id="acc-z">0.00</span></p>
    </div>

    <div class="sensor-block">
        <h3>Drehgeschwindigkeit (Gyroskop) [°/s]</h3>
        <p>Alpha (Z): <span id="gyro-alpha">0.00</span></p>
        <p>Beta (X):  <span id="gyro-beta">0.00</span></p>
        <p>Gamma (Y): <span id="gyro-gamma">0.00</span></p>
    </div>

    <script>
        const requestBtn = document.getElementById('request-btn');
        const statusText = document.getElementById('status');

        // Event-Listener für den Button
        requestBtn.addEventListener('click', async () => {
            // Prüfen, ob iOS Berechtigung erforderlich ist
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceMotionEvent.requestPermission();
                    if (permissionState === 'granted') {
                        initSensors();
                        statusText.innerText = "Status: Aktiviert (iOS)";
                        requestBtn.style.display = 'none';
                    } else {
                        statusText.innerText = "Status: Erlaubnis verweigert.";
                    }
                } catch (error) {
                    statusText.innerText = "Fehler: " + error;
                }
            } else {
                // Android oder Desktop (braucht meist keine explizite Permission via Button)
                initSensors();
                statusText.innerText = "Status: Aktiviert";
                requestBtn.style.display = 'none';
            }
        });

        function initSensors() {
            // 1. Accelerometer (Beschleunigung)
            window.addEventListener('devicemotion', (event) => {
                const acc = event.accelerationIncludingGravity;
                if (acc) {
                    document.getElementById('acc-x').innerText = acc.x ? acc.x.toFixed(4) : "N/A";
                    document.getElementById('acc-y').innerText = acc.y ? acc.y.toFixed(4) : "N/A";
                    document.getElementById('acc-z').innerText = acc.z ? acc.z.toFixed(4) : "N/A";
                }
            });

            // 2. Gyroskop (Drehung)
            window.addEventListener('deviceorientation', (event) => {
                // alpha: Rotation um die Z-Achse (0-360)
                // beta: Rotation um die X-Achse (-180-180)
                // gamma: Rotation um die Y-Achse (-90-90)
                document.getElementById('gyro-alpha').innerText = event.alpha ? event.alpha.toFixed(4) : "N/A";
                document.getElementById('gyro-beta').innerText = event.beta ? event.beta.toFixed(4) : "N/A";
                document.getElementById('gyro-gamma').innerText = event.gamma ? event.gamma.toFixed(4) : "N/A";
            });
        }
    </script>
</body>
</html>
