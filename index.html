<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maßband durch Bewegung</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            color: #c9d1d9;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { color: #fff; font-size: 1.5rem; margin-bottom: 2rem; }

        .glass-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 2rem;
        }

        .glass-button:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-1px); }
        .glass-button.recording { background: rgba(255, 59, 48, 0.15); border-color: rgba(255, 59, 48, 0.3); }
        .icon { width: 20px; height: auto; }

        .info-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .info-block {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .info-label { font-size: 0.8rem; color: #8b949e; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.1em; }
        .info-value { font-family: monospace; font-size: 1.4rem; color: #58a6ff; }
        .warning { color: #f85149; font-size: 0.8rem; margin-top: 2rem; text-align: center; opacity: 0.7; }
    </style>
</head>
<body>

    <h1>Virtual Space + Kalman-Filter</h1>
    
    <button id="main-btn" class="glass-button">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"></path>
            <path d="M12 8a4 4 0 1 1-4 4 4 4 0 0 1 4-4z"></path>
        </svg>
        <span id="btn-text">Start Space</span>
    </button>

    <p id="status" style="display:none; color: #8b949e;">Status: Warte...</p>

    <div class="info-container">
        <div class="info-block">
            <div class="info-label">Position (X | Y | Z)</div>
            <div class="info-value"><span id="pos-display">(0.00 | 0.00 | 0.00)</span> m</div>
        </div>

        <div class="info-block">
            <div class="info-label">Zurückgelegte Gesamtstrecke</div>
            <div class="info-value"><span id="path-display">0.00</span> m</div>
        </div>

        <div class="info-block">
            <div class="info-label">Entfernung zum Ursprung</div>
            <div class="info-value"><span id="dist-display">0.00</span> m</div>
        </div>
    </div>



    <script>
        const mainBtn = document.getElementById('main-btn');
        const btnText = document.getElementById('btn-text');
        const statusText = document.getElementById('status');
        const posDisplay = document.getElementById('pos-display');
        const pathDisplay = document.getElementById('path-display');
        const distDisplay = document.getElementById('dist-display');

        let isRecording = false;
        let lastTimestamp = 0;
        let stillstandTimer = 0;

        // Zustandsspeicher
        const state = {
            posX: 0, posY: 0, posZ: 0,
            velX: 0, velY: 0, velZ: 0,
            totalPath: 0
        };

        // --- KALMAN FILTER STRUKTUR ---
        // Klasse für einen einfachen 1D Kalman-Filter
        class KalmanFilter {
            constructor(q, r, p, initial_value) {
                this.q = q; // Prozessrauschen
                this.r = r; // Messrauschen
                this.p = p; // Schätzfehler
                this.x = initial_value; // Gefilterter Wert
            }

            update(measurement) {
                // Vorhersage (Prediction)
                // x = x (da wir keine Kontrollmatrix haben)
                this.p = this.p + this.q;

                // Korrektur (Measurement Update)
                const k = this.p / (this.p + this.r); // Kalman Gain
                this.x = this.x + k * (measurement - this.x);
                this.p = (1 - k) * this.p;

                return this.x;
            }
        }

        // Instanzen für jede Beschleunigungsachse anlegen
        // Parameter (Prozessrauschen, Messrauschen, Schätzfehler, Startwert)
        // Höheres R (Messrauschen) filtert stärker, reagiert aber träger.
        const kalmanX = new KalmanFilter(0.01, 0.5, 1, 0);
        const kalmanY = new KalmanFilter(0.01, 0.5, 1, 0);
        const kalmanZ = new KalmanFilter(0.01, 0.5, 1, 0);


        mainBtn.addEventListener('click', async () => {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceMotionEvent.requestPermission();
                    if (permissionState === 'granted') {
                        toggleRecording();
                    } else {
                        statusText.innerText = "Permission verweigert.";
                        statusText.style.display = 'block';
                    }
                } catch (error) {
                    statusText.innerText = "Fehler: " + error;
                    statusText.style.display = 'block';
                }
            } else {
                toggleRecording();
            }
        });

        function toggleRecording() {
            if (isRecording) {
                isRecording = false;
                btnText.innerText = "Start Space";
                mainBtn.classList.remove('recording');
                window.removeEventListener('devicemotion', handleMotion);
            } else {
                isRecording = true;
                btnText.innerText = "Stop & Hold";
                mainBtn.classList.add('recording');
                
                // Reset auf (0|0|0)
                state.posX = 0; state.posY = 0; state.posZ = 0;
                state.velX = 0; state.velY = 0; state.velZ = 0;
                state.totalPath = 0;
                stillstandTimer = 0;
                lastTimestamp = performance.now();
                
                updateDisplay();
                window.addEventListener('devicemotion', handleMotion);
            }
        }

        function handleMotion(event) {
            if (!isRecording) return;

            const now = performance.now();
            const dt = (now - lastTimestamp) / 1000; 
            lastTimestamp = now;

            if (dt <= 0) return;

            const acc = event.acceleration;

            if (acc && acc.x !== null) {
                // 1. Rauschende Sensordaten durch den Kalman-Filter jagen
                const filteredRawX = kalmanX.update(acc.x);
                const filteredRawY = kalmanY.update(acc.y);
                const filteredRawZ = kalmanZ.update(acc.z);

                // 2. Dead-Zone (Noise Floor) Filter nach dem Kalman
                const threshold = 0.12; // m/s²
                const ax = Math.abs(filteredRawX) > threshold ? filteredRawX : 0;
                const ay = Math.abs(filteredRawY) > threshold ? filteredRawY : 0;
                const az = Math.abs(filteredRawZ) > threshold ? filteredRawZ : 0;

                // 3. Stillstands-Detektor (Zero Velocity Update)
                // Wenn alle Achsen 0 registrieren, stoppen wir die Bewegung künstlich
                if (ax === 0 && ay === 0 && az === 0) {
                    stillstandTimer += dt;
                    if (stillstandTimer > 0.15) { // Nach 0.15 Sek Stillstand: Bremsen!
                        state.velX = 0;
                        state.velY = 0;
                        state.velZ = 0;
                    }
                } else {
                    stillstandTimer = 0;
                }

                // 4. Erste Integration: Geschwindigkeit (v = v + a * dt)
                state.velX += ax * dt;
                state.velY += ay * dt;
                state.velZ += az * dt;

                // 5. Zweite Integration: Position (s = s + v * dt)
                const dx = state.velX * dt;
                const dy = state.velY * dt;
                const dz = state.velZ * dt;

                state.posX += dx;
                state.posY += dy;
                state.posZ += dz;

                // 6. Wegstreckenberechnung
                const stepDistance = Math.sqrt(dx*dx + dy*dy + dz*dz);
                state.totalPath += stepDistance;

                updateDisplay();
            }
        }

        function updateDisplay() {
            posDisplay.innerText = `(${state.posX.toFixed(2)} | ${state.posY.toFixed(2)} | ${state.posZ.toFixed(2)})`;
            pathDisplay.innerText = state.totalPath.toFixed(2);
            
            const originDist = Math.sqrt(state.posX*state.posX + state.posY*state.posY + state.posZ*state.posZ);
            distDisplay.innerText = originDist.toFixed(2);
        }
    </script>
</body>
</html>
